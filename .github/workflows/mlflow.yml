name: MLflow CI Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # runs daily

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    # ===============================
    # STEP 1: DRIFT CHECK
    # ===============================
    - name: Check Data Drift
      id: drift
      continue-on-error: true
      run: |
        python src/drift.py

    # ===============================
    # STEP 2: TRAIN ONLY IF DRIFT
    # ===============================
    - name: Run Training Script
      if: steps.drift.outcome == 'failure'
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python src/train.py

    # ===============================
    # STEP 3: TEST ONLY IF TRAINED
    # ===============================
    - name: Run Tests
      if: steps.drift.outcome == 'failure'
      run: |
        pip install pytest
        pytest